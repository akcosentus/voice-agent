name: chris/eligibility
display_name: "Chris — Eligibility Check"
description: "Outbound agent that calls payers to verify patient eligibility"
type: outbound
prompt_file: prompt.txt

llm:
  provider: anthropic
  model: claude-sonnet-4-6
  max_tokens: 200
  temperature: 0.7
  enable_prompt_caching: true

tts:
  provider: elevenlabs
  voice_id: "pzxut4zZz4GImZNlqQ3H"
  model: eleven_turbo_v2_5
  settings:
    stability: 0.5
    similarity_boost: 0.8
    style: 0.0
    use_speaker_boost: false
    speed: 1.0

stt:
  provider: deepgram

telephony:
  phone_number: "+19496913324"

tools:
  - end_call
  - press_digit
  - transfer_call

first_message: "Hello, I'm calling to verify eligibility for a patient."

recording:
  enabled: true
  channels: 2

post_call_analyses: []

case_data:
  source: json
  path: "data/dummy_cases/chris_cases.json"
