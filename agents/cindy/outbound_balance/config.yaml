name: cindy/outbound_balance
display_name: "Cindy — Patient Balance Outbound"
description: "Outbound agent that calls patients about outstanding balances"
type: outbound
prompt_file: prompt.txt

llm:
  provider: anthropic
  model: claude-sonnet-4-6
  max_tokens: 150
  temperature: 0.6
  enable_prompt_caching: true

tts:
  provider: elevenlabs
  voice_id: "EXAVITQu4vr4xnSDxMaL"
  model: eleven_turbo_v2_5
  settings:
    stability: 0.6
    similarity_boost: 0.75
    style: 0.0
    use_speaker_boost: false
    speed: 1.0

stt:
  provider: deepgram

telephony:
  phone_number: "+19496913324"

transfer_targets:
  billing: "+14085559999"

tools:
  - end_call
  - transfer_call

first_message: "Hi, I'm calling from Pacific Coast Orthopedics regarding a balance on your account."

recording:
  enabled: true
  channels: 2

post_call_analyses: []

case_data:
  source: json
  path: "data/dummy_cases/cindy_cases.json"
